aipp_op {
    aipp_mode: static
    input_format: RGB888_U8  # 输入为RGB格式（匹配utils.read_image的输出）
    src_image_size_w: 256    # small模型输入宽度
    src_image_size_h: 256    # small模型输入高度

    # 关闭通道转换（输入已为RGB，无需BGR→RGB）
    csc_switch: false
    # 通道转换矩阵无需配置（因csc_switch为false）
    matrix_r0c0: 0
    matrix_r0c1: 0
    matrix_r0c2: 0
    matrix_r1c0: 0
    matrix_r1c1: 0
    matrix_r1c2: 0
    matrix_r2c0: 0
    matrix_r2c1: 0
    matrix_r2c2: 0
    input_bias_0: 0
    input_bias_1: 0
    input_bias_2: 0

    # 归一化参数（与代码中mean和std严格对应）
    min_chn_0: 123.675
    min_chn_1: 116.28
    min_chn_2: 103.53
    var_reci_chn_0: 0.017125
    var_reci_chn_1: 0.017508
    var_reci_chn_2: 0.017429
}
